name: Scan & Deploy

on:
  schedule:
    # Runs every 1 hour
    - cron: "0 * * * *"
  workflow_dispatch:   # lets you trigger it manually from the GitHub UI too

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner
        run: python scan.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html results.json
          git diff --cached --quiet || git commit -m "Auto-scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
